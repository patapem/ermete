# CHANGELOG GLOBALE:
# 1. Risolto errore di sintassi YAML sull'escaping di --os-release.
# 2. Sostituiti i blocchi heredoc non supportati nativamente dal parser YAML/Bash.
# 3. Rimozione totale logica decodifica Base64.
# 4. Rimozione parametri 'root=ostree' dall'UKI per risoluzione hash dinamica.
# 5. [ATTUALE] Sicurezza: Implementazione RAM-disk (/dev/shm) e shredding crittografico per protezione MOK_PRIV.

name: Build and Push Fedora Atomic OS
on:
  push:
    branches: 
      - "main"
      - "refactoring-enterprise"
      - "testing-uki"
  schedule:
    - cron: '0 2 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ermete

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af

      - name: Generate Tags
        id: tags
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date_tag=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build Layers 01-03
        run: |
          podman build -t localhost/core:latest -f Containerfile.01-core .
          podman build -t localhost/hardware:latest -f Containerfile.02-hardware .
          podman build -t localhost/gui:latest -f Containerfile.03-gui .

      - name: Extract Kernel, Stub and Generate Initramfs
        run: |
          CONTAINER_ID=$(podman create localhost/gui:latest)
          mkdir -p build-uki
          KVER=$(podman run --rm localhost/gui:latest ls -1 /usr/lib/modules/ | grep -v "dracut" | head -n 1)
          podman run --rm --privileged -v $(pwd)/build-uki:/out localhost/gui:latest dracut --nomdadmconf --nolvmconf --no-hostonly -f /out/initramfs.img ${KVER}
          podman cp ${CONTAINER_ID}:/usr/lib/modules/${KVER}/vmlinuz build-uki/vmlinuz
          podman cp ${CONTAINER_ID}:/usr/lib/systemd/boot/efi/linuxx64.efi.stub build-uki/linuxx64.efi.stub
          podman rm ${CONTAINER_ID}

      - name: Assemble Unified Kernel Image (UKIFY)
        run: |
          sudo apt-get update && sudo apt-get install -y systemd-ukify
          echo "quiet rw intel_iommu=on slab_nomerge module.sig_enforce=1" > build-uki/cmdline.txt
          ukify build \
            --linux=build-uki/vmlinuz \
            --initrd=build-uki/initramfs.img \
            --cmdline=@build-uki/cmdline.txt \
            --stub=build-uki/linuxx64.efi.stub \
            --os-release='NAME="Ermete OS" VERSION_ID="1.0" ID=ermeteos' \
            --output=build-uki/vmlinuz-ermete-unsigned.efi

      - name: Inject Keys and Sign UKI (Hardened Cryptographic Vault)
        run: |
          sudo apt-get update && sudo apt-get install -y sbsigntool coreutils
          
          # Inizializza una cassaforte isolata direttamente nella memoria RAM temporanea
          SECURE_VAULT="/dev/shm/ermete-crypto-vault"
          mkdir -p "$SECURE_VAULT"
          chmod 700 "$SECURE_VAULT"
          
          MOK_KEY_PATH="$SECURE_VAULT/MOK.key"
          MOK_CRT_PATH="$SECURE_VAULT/MOK.crt"
          
          # I/O diretto: inietta i secret senza farli passare dalle variabili d'ambiente visibili
          cat << 'EOF' > "$MOK_KEY_PATH"
          ${{ secrets.ERMETE_MOK_PRIV }}
          EOF
          
          cat << 'EOF' > "$MOK_CRT_PATH"
          ${{ secrets.ERMETE_MOK_CERT }}
          EOF
          
          # Blocco dei permessi in sola lettura per l'utente corrente
          chmod 400 "$MOK_KEY_PATH" "$MOK_CRT_PATH"
          
          # Validazione crittografica
          if ! grep -q "BEGIN PRIVATE KEY" "$MOK_KEY_PATH" || ! grep -q "BEGIN CERTIFICATE" "$MOK_CRT_PATH"; then
            echo "CRITICAL: Corrupted or missing cryptographic material." >&2
            shred --iterations=3 --random-source=/dev/urandom -u -z "$MOK_KEY_PATH" "$MOK_CRT_PATH"
            exit 1
          fi
          
          # Esecuzione firma leggendo dalla RAM
          sbsign --key "$MOK_KEY_PATH" --cert "$MOK_CRT_PATH" \
                 --output build-uki/vmlinuz-ermete.efi \
                 build-uki/vmlinuz-ermete-unsigned.efi
                 
           # SBLOCCO SCRITTURA: necessario affinché shred possa sovrascrivere fisicamente le celle RAM
          chmod 600 "$MOK_KEY_PATH" "$MOK_CRT_PATH"      
          
          # DISTRUZIONE CRITTOGRAFICA: sovrascrive le pagine RAM con dati casuali e zeri, poi distrugge il file
          shred --iterations=3 --random-source=/dev/urandom -u -z "$MOK_KEY_PATH"
          shred --iterations=3 --random-source=/dev/urandom -u -z "$MOK_CRT_PATH"
          rm -rf "$SECURE_VAULT"
          rm -f build-uki/vmlinuz-ermete-unsigned.efi

      - name: Inject Signed UKI & Build Final eBPF Layer
        run: |
          echo "FROM localhost/gui:latest" > Containerfile.final
          echo "COPY ./build-uki/vmlinuz-ermete.efi /usr/lib/modules/vmlinuz-ermete.efi" >> Containerfile.final
          podman build -t localhost/gui-signed:latest -f Containerfile.final .
          sed -i 's|FROM localhost/gui:latest|FROM localhost/gui-signed:latest|' Containerfile.04-ebpf
          podman build \
            -t ghcr.io/${{ env.IMAGE_NAME }}:latest \
            -t ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_short }} \
            -t ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.date_tag }} \
            -f Containerfile.04-ebpf .

      - name: Login to GitHub Container Registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OS Image
        run: |
          podman push ghcr.io/${{ env.IMAGE_NAME }}:latest
          podman push ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_short }}
          podman push ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.date_tag }}

      - name: Install Cosign & Sign Image
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign the Published Image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/${{ env.IMAGE_NAME }}:latest
          cosign sign --yes ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha_short }}
