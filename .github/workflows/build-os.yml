name: Build and Push Fedora Atomic OS
on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *' # Build notturna

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Obbligatorio per GHCR
      id-token: write # Obbligatorio per Sigstore/Cosign (Keyless signing)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af

      - name: Generate Tags
        id: tags
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date_tag=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build Core Layer
        run: podman build -t localhost/core:latest -f Containerfile.01-core .

      - name: Build Hardware Layer
        run: podman build -t localhost/hardware:latest -f Containerfile.02-hardware .

      - name: Build GUI Layer
        run: podman build -t localhost/gui:latest -f Containerfile.03-gui .

      - name: Build Final eBPF Layer & Tagging
        run: |
          podman build \
            -t ghcr.io/${{ github.repository_owner }}/ermete:latest \
            -t ghcr.io/${{ github.repository_owner }}/ermete:${{ steps.tags.outputs.sha_short }} \
            -t ghcr.io/${{ github.repository_owner }}/ermete:${{ steps.tags.outputs.date_tag }} \
            -f Containerfile.04-ebpf .

      - name: Login to GitHub Container Registry (Podman)
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OS Image to Registry
        run: |
          podman push ghcr.io/${{ github.repository_owner }}/ermete:latest
          podman push ghcr.io/${{ github.repository_owner }}/ermete:${{ steps.tags.outputs.sha_short }}
          podman push ghcr.io/${{ github.repository_owner }}/ermete:${{ steps.tags.outputs.date_tag }}

      # Fase 1: Supply Chain Security (Firma crittografica)
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign the Published Image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/ermete:latest
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/ermete:${{ steps.tags.outputs.sha_short }}
