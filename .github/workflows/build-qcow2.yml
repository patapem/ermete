name: Build and Inject Ermete OS (qcow2)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push Fedora Atomic OS"]
    types:
      - completed
    branches:
      - testing-uki
      - main

jobs:
  build-and-inject:
    # RIATTIVATO: La build parte in automatico se la pipeline OS ha avuto successo
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies for Rootless Virtualization
        run: |
          sudo apt-get update
          # Rimosso libguestfs-tools. Ora usiamo solo podman e KVM nativo.
          sudo apt-get install -y podman qemu-kvm
          sudo usermod -a -G kvm $USER

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build QCOW2 (Native bootc-image-builder)
        run: |
          mkdir -p output
          
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            FULL_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            FULL_SHA="${{ github.sha }}"
          fi
          
          SHORT_SHA=$(echo $FULL_SHA | cut -c1-7)
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/ermete:$SHORT_SHA"
          
          echo "1. Pulling local OCI image: $IMAGE_REF"
          podman pull $IMAGE_REF
          
          echo "2. Avvio build disco nativa (Senza --privileged e senza Guestfish hack)"
          # bootc-image-builder gestirà la partizione EFI, BLS e OSTree in modo transazionale
          sudo podman run --rm \
            --cap-add=SYS_ADMIN \
            --cap-add=MAC_ADMIN \
            --device /dev/kvm \
            --security-opt seccomp=unconfined \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build --type qcow2 --rootfs btrfs $IMAGE_REF

      - name: Upload Artifact (qcow2)
        uses: actions/upload-artifact@v4
        with:
          name: ermete-os-bootable-disk
          path: output/qcow2/disk.qcow2
          retention-days: 7
