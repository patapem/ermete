name: Build and Inject Ermete OS (qcow2)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push Fedora Atomic OS"]
    types:
      - completed
    branches:
      - testing-uki

jobs:
  build-and-inject:
    if: false ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Installa Dipendenze (Podman e libguestfs)
        run: |
          sudo apt-get update
          sudo apt-get install -y podman libguestfs-tools

      - name: Login al GitHub Container Registry come Root
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build qcow2 tramite bootc-image-builder
        run: |
          mkdir -p output
          
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            FULL_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            FULL_SHA="${{ github.sha }}"
          fi
          
          SHORT_SHA=$(echo $FULL_SHA | cut -c1-7)
          IMAGE_REF="ghcr.io/patapem/ermete:$SHORT_SHA"
          
          echo "========================================="
          echo "1. Scaricamento dell'immagine OCI locale: $IMAGE_REF"
          echo "========================================="
          sudo podman pull $IMAGE_REF
          
          echo "========================================="
          echo "2. Avvio build del disco qcow2 tramite osbuild"
          echo "========================================="
          sudo podman run --rm --privileged \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build --type qcow2 --rootfs btrfs $IMAGE_REF

      - name: Iniezione Bootloader e Configurazione Dinamica
        run: |
          echo "========================================="
          echo "3. Estrazione file dalla partizione di Root e Boot..."
          echo "========================================="
          mkdir -p /tmp/guest_root /tmp/guest_boot /tmp/guest_efi
          mkdir -p /tmp/extracted
          
          # 1. Estrazione UKI e Bootloader dalla Root (sda4)
          sudo guestmount -a output/qcow2/disk.qcow2 -m /dev/sda4 --ro /tmp/guest_root
          sudo find /tmp/guest_root/ -name "vmlinuz-ermete.efi" -exec cp {} /tmp/extracted/vmlinuz-ermete.efi \;
          sudo find /tmp/guest_root/ -path "*/usr/lib/systemd/boot/efi/systemd-bootx64.efi" -exec cp {} /tmp/extracted/BOOTX64.EFI \;
          sudo guestunmount /tmp/guest_root
          
          # 2. Estrazione parametri OSTree dinamici dalla Boot (sda3)
          sudo guestmount -a output/qcow2/disk.qcow2 -m /dev/sda3 --ro /tmp/guest_boot
          BLS_FILE=$(sudo find /tmp/guest_boot/loader/entries/ -name "*.conf" | head -n 1)
          sudo cp "$BLS_FILE" /tmp/extracted/boot.conf
          OPTIONS_LINE=$(grep "^options" /tmp/extracted/boot.conf)
          sudo guestunmount /tmp/guest_boot
          
          echo "========================================="
          echo "4. Iniezione nella partizione EFI..."
          echo "========================================="
          # Montaggio EFI (FAT32) in lettura/scrittura (sda2)
          sudo guestmount -a output/qcow2/disk.qcow2 -m /dev/sda2 /tmp/guest_efi
          
          sudo mkdir -p /tmp/guest_efi/EFI/BOOT
          sudo mkdir -p /tmp/guest_efi/EFI/Ermete
          sudo mkdir -p /tmp/guest_efi/loader/entries
          
          # Bootloader di fallback
          sudo cp /tmp/extracted/BOOTX64.EFI /tmp/guest_efi/EFI/BOOT/
          
          # UKI
          sudo cp /tmp/extracted/vmlinuz-ermete.efi /tmp/guest_efi/EFI/Ermete/
          
          # File loader.conf base
          echo -e "default ermete.conf\ntimeout 3\nconsole-mode max" | sudo tee /tmp/guest_efi/loader/loader.conf
          
          # Entry di menu con parametri dinamici
          echo -e "title Ermete OS (Secure UKI)\nefi /EFI/Ermete/vmlinuz-ermete.efi\n$OPTIONS_LINE" | sudo tee /tmp/guest_efi/loader/entries/ermete.conf
          
          sudo sync
          sudo guestunmount /tmp/guest_efi
          
          echo "Iniezione dinamica completata con successo! Disco armato."

      - name: Upload Artefatto (qcow2)
        uses: actions/upload-artifact@v4
        with:
          name: ermete-os-bootable-disk
          path: output/qcow2/disk.qcow2
          retention-days: 7
