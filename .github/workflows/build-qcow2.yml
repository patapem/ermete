name: Build and Inject Ermete OS (qcow2)

on:
  workflow_dispatch: # Permette di avviare il workflow manualmente
  push:
    branches:
      - testing-uki # Avvia automaticamente quando pushi su questo branch

jobs:
  build-and-inject:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Installa Dipendenze (Podman e libguestfs)
        run: |
          sudo apt-get update
          sudo apt-get install -y podman libguestfs-tools

      - name: Login al GitHub Container Registry come Root (Per Podman)
        run: |
          # Eseguiamo il login direttamente con sudo podman per garantire che
          # l'ambiente di root (usato da bootc-image-builder) abbia i token corretti.
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build qcow2 tramite bootc-image-builder
        run: |
          mkdir -p output
          
          # Estrae l'hash corto del commit per puntare all'immagine esatta
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_REF="ghcr.io/patapem/ermete:$SHORT_SHA"
          
          echo "========================================="
          echo "1. Scaricamento dell'immagine OCI in locale: $IMAGE_REF"
          echo "========================================="
          sudo podman pull $IMAGE_REF
          
          echo "========================================="
          echo "2. Avvio build del disco qcow2 tramite osbuild"
          echo "========================================="
          sudo podman run --rm --privileged \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build --type qcow2 --rootfs btrfs $IMAGE_REF

      - name: Iniezione Bootloader e UKI (Day-1 Automation)
        run: |
          echo "========================================="
          echo "3. Montaggio del disco qcow2 in corso..."
          echo "========================================="
          mkdir -p /tmp/guest
          # Il flag -i ispeziona il disco e monta automaticamente Root, Boot ed EFI
          sudo guestmount -a output/qcow2/disk.qcow2 -i /tmp/guest
          
          echo "Creazione struttura directory UEFI di fallback..."
          sudo mkdir -p /tmp/guest/boot/efi/EFI/BOOT
          sudo mkdir -p /tmp/guest/boot/efi/EFI/Linux
          
          echo "Estrazione di systemd-boot e iniezione come BOOTX64.EFI..."
          sudo find /tmp/guest/ostree/deploy/ -path "*/usr/lib/systemd/boot/efi/systemd-bootx64.efi" -exec sh -c 'cp "$1" /tmp/guest/boot/efi/EFI/BOOT/BOOTX64.EFI' _ {} \;
          
          echo "Estrazione dell'UKI e iniezione nella partizione Linux..."
          sudo find /tmp/guest/ostree/deploy/ -name "vmlinuz-ermete.efi" -exec sh -c 'cp "$1" /tmp/guest/boot/efi/EFI/Linux/' _ {} \;
          
          echo "Sincronizzazione e smontaggio sicuro..."
          sudo sync
          sudo guestunmount /tmp/guest
          
          echo "Iniezione completata con successo! Disco armato."

      - name: Upload Artefatto (qcow2)
        uses: actions/upload-artifact@v4
        with:
          name: ermete-os-bootable-disk
          path: output/qcow2/disk.qcow2
          retention-days: 7
