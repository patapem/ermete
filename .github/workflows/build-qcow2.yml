name: Build and Inject Ermete OS (qcow2)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push Fedora Atomic OS"]
    types:
      - completed
    branches:
      - testing-uki
      - main

jobs:
  build-and-inject:
    # RIATTIVATO: Ora parte in automatico se la build dell'OS è verde
    if: false
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies for Rootless Virtualization
        run: |
          sudo apt-get update
          # Installiamo i tool in modalità sicura e aggiungiamo l'utente al gruppo KVM
          sudo apt-get install -y podman libguestfs-tools qemu-kvm
          sudo usermod -a -G kvm $USER

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build QCOW2 (Capability Restricted Isolation)
        run: |
          mkdir -p output
          
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            FULL_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            FULL_SHA="${{ github.sha }}"
          fi
          
          SHORT_SHA=$(echo $FULL_SHA | cut -c1-7)
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/ermete:$SHORT_SHA"
          
          echo "1. Pulling local OCI image: $IMAGE_REF"
          podman pull $IMAGE_REF
          
          echo "2. Avvio build disco osbuild (Senza --privileged)"
          # Usiamo i permessi chirurgici come richiesto dall'audit
          sudo podman run --rm \
            --cap-add=SYS_ADMIN \
            --cap-add=MAC_ADMIN \
            --device /dev/kvm \
            --security-opt seccomp=unconfined \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build --type qcow2 --rootfs btrfs $IMAGE_REF

      - name: Estrazione e Iniezione Sicura (Rootless via Guestfish)
        run: |
          mkdir -p /tmp/extracted
          
          # ESTRAZIONE DA CONTAINER (Molto più sicuro e veloce che estrarre dal disco fuzzed)
          CONTAINER_ID=$(podman create $IMAGE_REF)
          podman cp ${CONTAINER_ID}:/usr/lib/modules/vmlinuz-ermete.efi /tmp/extracted/vmlinuz-ermete.efi
          podman cp ${CONTAINER_ID}:/usr/lib/systemd/boot/efi/systemd-bootx64.efi /tmp/extracted/BOOTX64.EFI
          podman rm ${CONTAINER_ID}
          
          # INIEZIONE NEL DISCO TRAMITE GUESTFISH (Isolato e Rootless)
          export LIBGUESTFS_BACKEND=direct
          
          echo "Iniezione file nella partizione EFI (/dev/sda2)..."
          guestfish -a output/qcow2/disk.qcow2 -m /dev/sda2 <<EOF
          mkdir-p /EFI/BOOT
          mkdir-p /EFI/Ermete
          mkdir-p /loader/entries
          
          upload /tmp/extracted/BOOTX64.EFI /EFI/BOOT/BOOTX64.EFI
          upload /tmp/extracted/vmlinuz-ermete.efi /EFI/Ermete/vmlinuz-ermete.efi
          
          write /loader/loader.conf "default ermete.conf\ntimeout 3\nconsole-mode max\n"
          write /loader/entries/ermete.conf "title Ermete OS (Secure UKI)\nefi /EFI/Ermete/vmlinuz-ermete.efi\noptions quiet rw intel_iommu=on slab_nomerge module.sig_enforce=1 root=ostree\n"
          EOF
          
          echo "Disco armato in sicurezza estrema."

      - name: Upload Artifact (qcow2)
        uses: actions/upload-artifact@v4
        with:
          name: ermete-os-bootable-disk
          path: output/qcow2/disk.qcow2
          retention-days: 7
