#!/usr/sbin/nft -f
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        
        # 1. Ottimizzazione Conntrack via vmap per performance O(1)
        # Sostituisce la valutazione sequenziale con mapping diretto
        ct state vmap { established : accept, related : accept, invalid : drop }
        
        # 2. Loopback nativo
        iifname "lo" accept
        
        # 3. Gestione ICMP e ICMPv6
        # Inclusione di echo-request per liveness probes e monitoraggio infrastrutturale
        ip protocol icmp icmp type { echo-request, destination-unreachable, router-advertisement, time-exceeded, parameter-problem } accept
        ip6 nexthdr icmpv6 icmpv6 type { echo-request, destination-unreachable, packet-too-big, time-exceeded, parameter-problem, nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } accept

        # 4. Accesso Amministrativo
        # Apertura SSH per permettere il provisioning remoto e il disaster recovery
        tcp dport 22 accept
    }
    chain forward {
        type filter hook forward priority 0; policy drop;
    }
    chain output {
        type filter hook output priority 0; policy accept;
    }
}
